<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Inter, sans-serif;
      padding: 16px;
      text-align: center;
      background: #1e1e1e;
      color: #fff;
    }
    .status {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e74c3c;
      margin-right: 8px;
    }
    .status.connected { background: #2ecc71; }
    h2 { font-size: 14px; margin-bottom: 8px; }
    p { font-size: 11px; opacity: 0.7; }
  </style>
</head>
<body>
  <h2><span id="indicator" class="status"></span>The Design of Pablo Bridge</h2>
  
  <div style="margin: 12px 0;">
    <input type="text" id="serverUrl" value="http://127.0.0.1:3000" style="width: 140px; padding: 4px; font-size: 11px; background: #2c2c2c; border: 1px solid #444; color: white;" />
    <button id="connectBtn" style="padding: 4px 8px; font-size: 11px; background: #000; color: white; border: 1px solid #444; cursor: pointer;">Connect</button>
  </div>
  
  <p id="message">Waiting to connect...</p>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    let socket;
    const indicator = document.getElementById('indicator');
    const msg = document.getElementById('message');
    const serverUrlInput = document.getElementById('serverUrl');
    const connectBtn = document.getElementById('connectBtn');

    function connectToServer(url) {
      if (socket) socket.disconnect();
      
      msg.textContent = 'Connecting to ' + url + '...';
      socket = io(url, {
        transports: ['websocket', 'polling'], // Fallback for cloud providers
        reconnectionDelayMax: 10000,
      });

      socket.on('connect', () => {
        indicator.className = 'status connected';
        msg.textContent = 'Ready! Waiting for a push from your phone...';
        parent.postMessage({ pluginMessage: { type: 'CLIENT_CONNECTED' } }, '*');
      });

      socket.on('disconnect', () => {
        indicator.className = 'status';
        msg.textContent = 'Disconnected. Is your backend running?';
      });

      socket.on('connect_error', (err) => {
        indicator.className = 'status';
        msg.textContent = 'Connection Error: ' + err.message;
      });

      socket.on('apply_design_system', (data) => {
        msg.textContent = 'Updating Figma variables...';
        console.log("Received design system from phone!", data);
        parent.postMessage({ pluginMessage: { type: 'APPLY_SYSTEM', payload: data } }, '*');
        setTimeout(() => { msg.textContent = 'Applied successfully! Waiting...'; }, 3000);
      });
    }

    // Connect securely by default
    connectToServer(serverUrlInput.value);

    // Allow user to change server and reconnect
    connectBtn.addEventListener('click', () => {
      connectToServer(serverUrlInput.value);
    });
  </script>
</body>
</html>
